services:
  backend:
    build: .
    container_name: ai_enterprise_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: ai_enterprise_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"