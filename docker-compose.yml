services:

  backend:
    build: .
    container_name: ai_enterprise_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db

    depends_on:
      - minio
      - postgres

  minio:
    image: minio/minio
    container_name: ai_enterprise_minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword

    volumes:
      - ./minio_data:/data

    command: server /data --console-address ":9001"

  postgres:
    image: postgres:16
    container_name: ai_enterprise_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_enterprise
      POSTGRES_USER: aiadmin
      POSTGRES_PASSWORD: aiadmin123

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiadmin -d ai_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: